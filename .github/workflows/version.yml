name: Bump App Version

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip version]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Bump version
        id: bump
        run: |
          VERSION=$(node scripts/bump-version.cjs)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Commit version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump app version to ${{ steps.bump.outputs.version }} [skip version]"
          git push
